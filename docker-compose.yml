version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --save ""
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro
      - ./sample_data:/app/sample_data:ro
      - ./finspark.db:/app/finspark.db
      - ./audit.log:/app/audit.log
    restart: unless-stopped
